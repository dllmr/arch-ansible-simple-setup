---
- name: flatpak.yml - install flatpaks
  hosts: localhost
  connection: local
  become: yes
  
  tasks:
    - name: Ensure Flathub remote exists
      flatpak_remote:
        name: flathub
        state: present
        flatpakrepo_url: https://dl.flathub.org/repo/flathub.flatpakrepo
        method: system

    - name: Install flatpaks
      flatpak:
        name:
          - com.github.tchx84.Flatseal                # manage Flatpak app permissions
          - io.github.flattool.Warehouse              # Flatpak package manager GUI
          - com.anydesk.Anydesk                       # remote desktop client
          - com.github.IsmaelMartinez.teams_for_linux # Microsoft Teams client
          - org.qgis.qgis/x86_64/stable               # GIS and mapping suite
          - org.gnome.Papers                          # GNOME document viewer
          - org.gnome.gitlab.somas.Apostrophe         # Markdown editor
          - com.github.zocker_160.SyncThingy          # Syncthing GUI client
          - org.stellarium.Stellarium                 # planetarium software
          - io.typora.Typora                          # Markdown editor
          - ca.littlesvr.asunder                      # CD ripper/encoder (was AUR: asunder)
          - com.github.PintaProject.Pinta             # image editor (was AUR: pinta)
          - com.google.Chrome                         # Google Chrome browser (was AUR: google-chrome)
          - com.google.EarthPro                       # Google Earth Pro (was AUR: google-earth-pro)
          - com.slack.Slack                           # Slack client (was AUR: slack-desktop)
          - com.spotify.Client                        # Spotify music client (was AUR: spotify)
          - com.sublimemerge.App                      # Sublime Merge Git client (was AUR: sublime-merge)
          - com.visualstudio.code                     # VS Code editor (was AUR: visual-studio-code-bin)
          - io.github.Pithos                          # Pandora Radio client (was AUR: pithos)
          - org.localsend.localsend_app               # LocalSend file transfer (was AUR: localsend-bin)
          - us.zoom.Zoom                              # Zoom video client (was AUR: zoom)
        state: present
        remote: flathub
        method: system

    - name: Ensure GNOME flatpaks look good even when running with other DEs
      pacman:
        update_cache: yes
        name:
          - xdg-desktop-portal-gtk  # GTK portal backend
        state: present

    - name: Allow Chrome to access ~/.local/share
      ansible.builtin.command:
        cmd: flatpak override --system com.google.Chrome --filesystem=~/.local/share
      changed_when: false

    - name: Allow VS Code to access KWallet on the session bus
      ansible.builtin.command:
        cmd: flatpak override --system com.visualstudio.code --talk-name=org.kde.KWallet.* --talk-name=org.kde.kwalletd6
      changed_when: false

